mutation UpdateEntry(
  $mediaId: Int
  $status: MediaListStatus
  $score: Float
  $progress: Int
  $progressVolumes: Int
  $repeat: Int
  $note: String
  $startedAt: FuzzyDateInput
  $completedAt: FuzzyDateInput
) {
  SaveMediaListEntry(
    mediaId: $mediaId
    status: $status
    score: $score
    progress: $progress
    progressVolumes: $progressVolumes
    repeat: $repeat
    note: $note
    startedAt: $startedAt
    completedAt: $completedAt
  ) {
    score
    status
    progress
    repeat
    notes
    startedAt {
      day
      month
      year
    }
    completedAt {
      day
      month
      year
    }
  }
}
