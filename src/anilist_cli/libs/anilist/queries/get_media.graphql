query GetMedia(
  $page: Int
  $perPage: Int
  $id: Int
  $type: MediaType
  $format: MediaFormat
  $status: MediaStatus
  $season: MediaSeason
  $seasonYear: Int
  $episodes: Int
  $duration: Int
  $chapters: Int
  $volumes: Int
  $onList: Boolean
  $averageScore: Int
  $popularity: Int
  $search: String
  $genre_in: [String]
  $genre_not_in: [String]
  $tag_in: [String]
  $tag_not_in: [String]
  $sort: [MediaSort]
) {
  Page(page: $page, perPage: $perPage) {
    media(
      id: $id
      type: $type
      format: $format
      status: $status
      season: $season
      seasonYear: $seasonYear
      episodes: $episodes
      duration: $duration
      chapters: $chapters
      volumes: $volumes
      onList: $onList
      averageScore: $averageScore
      popularity: $popularity
      search: $search
      genre_in: $genre_in
      genre_not_in: $genre_not_in
      tag_in: $tag_in
      tag_not_in: $tag_not_in
      sort: $sort
    ) {
      id
      title {
        english
        romaji
      }
      status
      popularity
      averageScore
      chapters
      episodes
      duration
      season
      seasonYear
      volumes
      format
      type
      mediaListEntry {
        progress
        status
        score
      }
    }
    pageInfo {
      hasNextPage
      currentPage
      lastPage
      perPage
      total
    }
  }
}
